openapi: 3.1.0
info:
    title: ResilienceService API
    version: 1.0.0
paths:
    /api/resilience/v1/get-resilience-score:
        get:
            tags:
                - ResilienceService
            summary: GetResilienceScore
            operationId: GetResilienceScore
            parameters:
                - name: countryCode
                  in: query
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetResilienceScoreResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
    /api/resilience/v1/get-resilience-ranking:
        get:
            tags:
                - ResilienceService
            summary: GetResilienceRanking
            operationId: GetResilienceRanking
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/GetResilienceRankingResponse'
                "400":
                    description: Validation error
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/ValidationError'
                default:
                    description: Error response
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Error'
components:
    schemas:
        Error:
            type: object
            properties:
                message:
                    type: string
                    description: Error message (e.g., 'user not found', 'database connection failed')
            description: Error is returned when a handler encounters an error. It contains a simple error message that the developer can customize.
        FieldViolation:
            type: object
            properties:
                field:
                    type: string
                    description: The field path that failed validation (e.g., 'user.email' for nested fields). For header validation, this will be the header name (e.g., 'X-API-Key')
                description:
                    type: string
                    description: Human-readable description of the validation violation (e.g., 'must be a valid email address', 'required field missing')
            required:
                - field
                - description
            description: FieldViolation describes a single validation error for a specific field.
        ValidationError:
            type: object
            properties:
                violations:
                    type: array
                    items:
                        $ref: '#/components/schemas/FieldViolation'
                    description: List of validation violations
            required:
                - violations
            description: ValidationError is returned when request validation fails. It contains a list of field violations describing what went wrong.
        GetResilienceScoreRequest:
            type: object
            properties:
                countryCode:
                    type: string
        GetResilienceScoreResponse:
            type: object
            properties:
                countryCode:
                    type: string
                overallScore:
                    type: number
                    format: double
                level:
                    type: string
                domains:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResilienceDomain'
                trend:
                    type: string
                change30d:
                    type: number
                    format: double
                lowConfidence:
                    type: boolean
                imputationShare:
                    type: number
                    format: double
                baselineScore:
                    type: number
                    format: double
                stressScore:
                    type: number
                    format: double
                stressFactor:
                    type: number
                    format: double
                dataVersion:
                    type: string
                scoreInterval:
                    $ref: '#/components/schemas/ScoreInterval'
        ResilienceDomain:
            type: object
            properties:
                id:
                    type: string
                score:
                    type: number
                    format: double
                weight:
                    type: number
                    format: double
                dimensions:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResilienceDimension'
        ResilienceDimension:
            type: object
            properties:
                id:
                    type: string
                score:
                    type: number
                    format: double
                coverage:
                    type: number
                    format: double
                observedWeight:
                    type: number
                    format: double
                imputedWeight:
                    type: number
                    format: double
        ScoreInterval:
            type: object
            properties:
                p05:
                    type: number
                    format: double
                p95:
                    type: number
                    format: double
        GetResilienceRankingRequest:
            type: object
        GetResilienceRankingResponse:
            type: object
            properties:
                items:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResilienceRankingItem'
                greyedOut:
                    type: array
                    items:
                        $ref: '#/components/schemas/ResilienceRankingItem'
        ResilienceRankingItem:
            type: object
            properties:
                countryCode:
                    type: string
                overallScore:
                    type: number
                    format: double
                level:
                    type: string
                lowConfidence:
                    type: boolean
                overallCoverage:
                    type: number
                    format: double
                rankStable:
                    type: boolean
