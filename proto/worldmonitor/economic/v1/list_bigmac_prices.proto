syntax = "proto3";

package worldmonitor.economic.v1;

import "sebuf/http/annotations.proto";

message BigMacCountryPrice {
  string code = 1;
  string name = 2;
  string currency = 3;
  string flag = 4;
  double local_price = 5;
  double usd_price = 6;
  double fx_rate = 7;
  string source_site = 8;
  bool available = 9;
  double wow_pct = 10;           // WoW % change in USD price
}

message ListBigMacPricesRequest {}

message ListBigMacPricesResponse {
  repeated BigMacCountryPrice countries = 1;
  string fetched_at = 2;
  string cheapest_country = 3;
  string most_expensive_country = 4;
  double wow_avg_pct = 5;       // average WoW % change across all countries with data
  bool wow_available = 6;        // false on first run (no :prev snapshot yet)
  string prev_fetched_at = 7;    // ISO timestamp of previous snapshot
}
