syntax = "proto3";

package worldmonitor.climate.v1;

import "sebuf/http/annotations.proto";

// ClimateDisaster represents a climate-relevant disaster event from seeded caches.
message ClimateDisaster {
  // Unique event identifier.
  string id = 1;
  // Disaster type: flood, cyclone, drought, heatwave, wildfire.
  string type = 2;
  // Human-readable event name.
  string name = 3;
  // Country name.
  string country = 4;
  // ISO 3166-1 alpha-2 country code.
  string country_code = 5;
  // Event latitude.
  double lat = 6;
  // Event longitude.
  double lng = 7;
  // Severity level. GDACS: green/orange/red. ReliefWeb: low/medium/high.
  string severity = 8;
  // Event start time as Unix epoch milliseconds
  int64 started_at = 9 [(sebuf.http.int64_encoding) = INT64_ENCODING_NUMBER];
  // Event status: alert/ongoing/past.
  string status = 10;
  // Affected population when available.
  int32 affected_population = 11;
  // Source system: GDACS, ReliefWeb, NASA FIRMS.
  string source = 12;
  // Source URL for drill-down.
  string source_url = 13;
}
