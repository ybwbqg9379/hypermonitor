syntax = "proto3";
package worldmonitor.intelligence.v1;

import "sebuf/http/annotations.proto";
import "worldmonitor/intelligence/v1/classify_event.proto";
import "worldmonitor/intelligence/v1/deduct_situation.proto";
import "worldmonitor/intelligence/v1/get_company_enrichment.proto";
import "worldmonitor/intelligence/v1/get_country_facts.proto";
import "worldmonitor/intelligence/v1/get_country_intel_brief.proto";
import "worldmonitor/intelligence/v1/get_pizzint_status.proto";
import "worldmonitor/intelligence/v1/get_risk_scores.proto";
import "worldmonitor/intelligence/v1/list_security_advisories.proto";
import "worldmonitor/intelligence/v1/list_company_signals.proto";
import "worldmonitor/intelligence/v1/list_gps_interference.proto";
import "worldmonitor/intelligence/v1/list_oref_alerts.proto";
import "worldmonitor/intelligence/v1/list_satellites.proto";
import "worldmonitor/intelligence/v1/list_telegram_feed.proto";
import "worldmonitor/intelligence/v1/search_gdelt_documents.proto";
import "worldmonitor/intelligence/v1/get_gdelt_topic_timeline.proto";
import "worldmonitor/intelligence/v1/list_cross_source_signals.proto";
import "worldmonitor/intelligence/v1/list_market_implications.proto";
import "worldmonitor/intelligence/v1/get_social_velocity.proto";

// IntelligenceService provides APIs for technical and strategic intelligence.
service IntelligenceService {
  option (sebuf.http.service_config) = {base_path: "/api/intelligence/v1"};

  // GetRiskScores retrieves composite risk scores and strategic assessments.
  rpc GetRiskScores(GetRiskScoresRequest) returns (GetRiskScoresResponse) {
    option (sebuf.http.config) = {
      path: "/get-risk-scores"
      method: HTTP_METHOD_GET
    };
  }

  // GetPizzintStatus retrieves Pentagon Pizza Index and GDELT tension data.
  rpc GetPizzintStatus(GetPizzintStatusRequest) returns (GetPizzintStatusResponse) {
    option (sebuf.http.config) = {
      path: "/get-pizzint-status"
      method: HTTP_METHOD_GET
    };
  }

  // ClassifyEvent analyzes a news event using AI models.
  rpc ClassifyEvent(ClassifyEventRequest) returns (ClassifyEventResponse) {
    option (sebuf.http.config) = {path: "/classify-event", method: HTTP_METHOD_GET};
  }

  // GetCountryIntelBrief generates a strategic brief for a specific country.
  rpc GetCountryIntelBrief(GetCountryIntelBriefRequest) returns (GetCountryIntelBriefResponse) {
    option (sebuf.http.config) = {
      path: "/get-country-intel-brief"
      method: HTTP_METHOD_GET
    };
  }

  // SearchGdeltDocuments searches the GDELT GKG API for relevant documentation.
  rpc SearchGdeltDocuments(SearchGdeltDocumentsRequest) returns (SearchGdeltDocumentsResponse) {
    option (sebuf.http.config) = {
      path: "/search-gdelt-documents"
      method: HTTP_METHOD_GET
    };
  }

  // DeductSituation performs broad situational analysis using LLMs.
  rpc DeductSituation(DeductSituationRequest) returns (DeductSituationResponse) {
    option (sebuf.http.config) = {path: "/deduct-situation"};
  }

  // ListSatellites retrieves current orbital positions and metadata.
  rpc ListSatellites(ListSatellitesRequest) returns (ListSatellitesResponse) {
    option (sebuf.http.config) = {
      path: "/list-satellites"
      method: HTTP_METHOD_GET
    };
  }

  // ListGpsInterference retrieves detected GPS/GNSS interference data (jamming).
  rpc ListGpsInterference(ListGpsInterferenceRequest) returns (ListGpsInterferenceResponse) {
    option (sebuf.http.config) = {
      path: "/list-gps-interference"
      method: HTTP_METHOD_GET
    };
  }

  // ListOrefAlerts retrieves Israeli Home Front Command alerts (Red Alerts).
  rpc ListOrefAlerts(ListOrefAlertsRequest) returns (ListOrefAlertsResponse) {
    option (sebuf.http.config) = {
      path: "/list-oref-alerts"
      method: HTTP_METHOD_GET
    };
  }

  // ListTelegramFeed retrieves real-time OSINT messages from monitored Telegram channels.
  rpc ListTelegramFeed(ListTelegramFeedRequest) returns (ListTelegramFeedResponse) {
    option (sebuf.http.config) = {
      path: "/list-telegram-feed"
      method: HTTP_METHOD_GET
    };
  }

  // GetCompanyEnrichment aggregates company data from multiple public sources (GitHub, SEC, HN).
  rpc GetCompanyEnrichment(GetCompanyEnrichmentRequest) returns (GetCompanyEnrichmentResponse) {
    option (sebuf.http.config) = {
      path: "/get-company-enrichment"
      method: HTTP_METHOD_GET
    };
  }

  // ListCompanySignals discovers activity signals for a company from public sources.
  rpc ListCompanySignals(ListCompanySignalsRequest) returns (ListCompanySignalsResponse) {
    option (sebuf.http.config) = {
      path: "/list-company-signals"
      method: HTTP_METHOD_GET
    };
  }

  // GetCountryFacts retrieves factual country data from RestCountries and Wikipedia.
  rpc GetCountryFacts(GetCountryFactsRequest) returns (GetCountryFactsResponse) {
    option (sebuf.http.config) = {path: "/get-country-facts", method: HTTP_METHOD_GET};
  }

  // ListSecurityAdvisories retrieves pre-seeded travel and health advisories.
  rpc ListSecurityAdvisories(ListSecurityAdvisoriesRequest) returns (ListSecurityAdvisoriesResponse) {
    option (sebuf.http.config) = {path: "/list-security-advisories", method: HTTP_METHOD_GET};
  }

  // GetGdeltTopicTimeline retrieves tone and volume timelines for a GDELT intel topic.
  rpc GetGdeltTopicTimeline(GetGdeltTopicTimelineRequest) returns (GetGdeltTopicTimelineResponse) {
    option (sebuf.http.config) = {path: "/get-gdelt-topic-timeline", method: HTTP_METHOD_GET};
  }

  // ListCrossSourceSignals returns cross-domain signals ranked by severity with composite escalation detection.
  rpc ListCrossSourceSignals(ListCrossSourceSignalsRequest) returns (ListCrossSourceSignalsResponse) {
    option (sebuf.http.config) = {path: "/list-cross-source-signals", method: HTTP_METHOD_GET};
  }

  // ListMarketImplications returns AI-generated trade-implication cards from live world state.
  rpc ListMarketImplications(ListMarketImplicationsRequest) returns (ListMarketImplicationsResponse) {
    option (sebuf.http.config) = {path: "/list-market-implications", method: HTTP_METHOD_GET};
  }

  // GetSocialVelocity returns trending Reddit posts from r/worldnews and r/geopolitics ranked by velocity.
  rpc GetSocialVelocity(GetSocialVelocityRequest) returns (GetSocialVelocityResponse) {
    option (sebuf.http.config) = {path: "/get-social-velocity", method: HTTP_METHOD_GET};
  }
}
