retailer:
  slug: woolworths_au
  name: Woolworths Australia
  marketCode: au
  currencyCode: AUD
  adapter: search
  baseUrl: https://www.woolworths.com.au
  enabled: true

  searchConfig:
    numResults: 5
    urlPathContains: /shop/productdetails/
    queryTemplate: "{canonicalName} grocery {market} {currency} price"

  rateLimit:
    requestsPerMinute: 15
    maxConcurrency: 1
    delayBetweenRequestsMs: 4000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
