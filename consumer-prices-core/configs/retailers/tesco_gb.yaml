retailer:
  slug: tesco_gb
  name: Tesco UK
  marketCode: gb
  currencyCode: GBP
  adapter: search
  baseUrl: https://www.tesco.com
  enabled: true

  searchConfig:
    numResults: 5
    urlPathContains: /groceries/en-GB/products/
    queryTemplate: "{canonicalName} grocery {market} {currency} price"

  rateLimit:
    requestsPerMinute: 15
    maxConcurrency: 1
    delayBetweenRequestsMs: 4000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
