retailer:
  slug: carrefour_br
  name: Carrefour Brasil
  marketCode: br
  currencyCode: BRL
  adapter: search
  baseUrl: https://mercado.carrefour.com.br
  enabled: true

  searchConfig:
    numResults: 5
    queryTemplate: "{canonicalName} supermercado brasil {currency} preço"
    urlPathContains: /p/

  rateLimit:
    requestsPerMinute: 10
    maxConcurrency: 1
    delayBetweenRequestsMs: 6000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
