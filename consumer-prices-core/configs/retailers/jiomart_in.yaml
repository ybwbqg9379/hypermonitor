retailer:
  slug: jiomart_in
  name: JioMart India
  marketCode: in
  currencyCode: INR
  adapter: search
  baseUrl: https://www.jiomart.com
  enabled: true

  searchConfig:
    numResults: 5
    queryTemplate: "{canonicalName} grocery {market} {currency} price"
    urlPathContains: /p/

  rateLimit:
    requestsPerMinute: 10
    maxConcurrency: 1
    delayBetweenRequestsMs: 6000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
