retailer:
  slug: ananinja_sa
  name: AnaNinja Saudi Arabia
  marketCode: sa
  currencyCode: SAR
  adapter: search
  baseUrl: https://ananinja.com/sa/en
  enabled: true

  searchConfig:
    numResults: 5
    queryTemplate: "{canonicalName} ananinja saudi"
    urlPathContains: /product/  # ananinja.com also indexes restaurant menus (/restaurants/); restrict to product pages
    inStockFromPrice: true  # ananinja.com is a price aggregator; Firecrawl misreads availability

  rateLimit:
    requestsPerMinute: 10
    maxConcurrency: 1
    delayBetweenRequestsMs: 6000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
