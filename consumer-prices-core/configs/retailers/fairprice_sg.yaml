retailer:
  slug: fairprice_sg
  name: FairPrice Singapore
  marketCode: sg
  currencyCode: SGD
  adapter: search
  baseUrl: https://www.fairprice.com.sg
  enabled: true

  searchConfig:
    numResults: 5
    urlPathContains: /product/
    queryTemplate: "{canonicalName} grocery {market} {currency} price"

  rateLimit:
    requestsPerMinute: 10
    maxConcurrency: 1
    delayBetweenRequestsMs: 6000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
