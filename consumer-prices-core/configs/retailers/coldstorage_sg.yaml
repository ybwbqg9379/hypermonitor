retailer:
  slug: coldstorage_sg
  name: Cold Storage Singapore
  marketCode: sg
  currencyCode: SGD
  adapter: search
  baseUrl: https://coldstorage.com.sg
  enabled: true

  searchConfig:
    numResults: 5
    queryTemplate: "{canonicalName} grocery singapore {currency} price"
    urlPathContains: /product/

  rateLimit:
    requestsPerMinute: 10
    maxConcurrency: 1
    delayBetweenRequestsMs: 6000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
