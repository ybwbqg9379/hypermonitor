retailer:
  slug: naivas_ke
  name: Naivas Supermarket Kenya
  marketCode: ke
  currencyCode: KES
  adapter: search
  baseUrl: https://www.naivas.online
  enabled: false

  searchConfig:
    numResults: 5
    urlPathContains: /product/
    queryTemplate: "{canonicalName} grocery Kenya {currency} price"

  rateLimit:
    requestsPerMinute: 10
    maxConcurrency: 1
    delayBetweenRequestsMs: 6000

  discovery:
    mode: search
    maxPages: 20
    seeds: []
